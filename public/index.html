<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Directory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f3460;
      line-height: 1;
    }

    .toolbar {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: #0f3460; }

    select {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus { border-color: #0f3460; }

    button {
      color: white;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: #2196F3;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    button:active { 
      background: #0f3460; 
      color: gray;
    }

    #resultCount {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
    }

    .table-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fb;
      padding: 14px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1.5px solid #eee;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    thead th:hover { background: #eef0f4; }

    thead th .sort-icon { margin-left: 4px; opacity: 0.4; font-size: 0.7rem; }
    thead th.active .sort-icon { opacity: 1; color: #0f3460; }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f7f8fc; }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .employee-row {
      cursor: pointer;
    }

    .employee-row:hover {
      background: #f5f7fa;
    }

    dialog {
      padding: 1rem;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      max-width: 90vw;
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.45);
    }

    label:has(input[required]) span::after {
      content: " *";
      color: red;
    }

    #employeeForm {
      display: grid;
      gap: 12px;
    }

    #employeeForm h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #0f3460;
      margin-bottom: 4px;
    }

    #employeeForm label {
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      font-weight: 600;
      gap: 4px;
    }

    #employeeForm input {
      padding: 8px 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #employeeForm input:focus {
      border-color: #0f3460;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .name-cell .name { font-weight: 600; }
    .name-cell .email { font-size: 0.8rem; color: #888; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
    }

    .empty-state svg { margin-bottom: 12px; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }

    #loadingRow td {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 700px) {
      .container { padding: 0 12px; }
      td:nth-child(4), th:nth-child(4),
      td:nth-child(6), th:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>

<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
    <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.1)"/>
    <circle cx="18" cy="14" r="5" fill="white" opacity="0.9"/>
    <path d="M8 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
  </svg>
  <div>
    <h1>Employee Directory</h1>
    <p>Manage and view all company employees</p>
  </div>
</header>

<div class="container">

  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <span class="label">Total Employees</span>
      <span class="value" id="statTotal">—</span>
    </div>
    <div class="stat-card">
      <span class="label">Departments</span>
      <span class="value" id="statDepts">—</span>
    </div>
    <div class="stat-card">
      <span class="label">Avg. Salary</span>
      <span class="value" id="statSalary">—</span>
    </div>
  </div>

  <div class="toolbar">
    <button id="employeeOpenFormBtn">
      Add Employee
    </button>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search by name, position, or email…" />
    </div>
    <select id="deptFilter">
      <option value="all">All Departments</option>
    </select>
    <span id="resultCount"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="id">ID <span class="sort-icon">▲</span></th>
          <th data-col="name">Employee <span class="sort-icon">▲</span></th>
          <th data-col="department">Department <span class="sort-icon">▲</span></th>
          <th data-col="position">Position <span class="sort-icon">▲</span></th>
          <th data-col="hire_date">Hire Date <span class="sort-icon">▲</span></th>
          <th data-col="salary">Salary <span class="sort-icon">▲</span></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr id="loadingRow"><td colspan="6">Loading employees…</td></tr>
      </tbody>
    </table>
  </div>

  <dialog id="employeeModal">
    <form id="employeeForm">
      <h1 id="employeeFormHeader"></h1>
      <p>
        <label for="name">
          <span>Name:</span>
          <input type="text" id="name" name="name" required />
        </label>
      </p>
      <p>
        <label for="department">
          <span>Department:</span>
          <input type="text" id="department" name="department" required />
        </label>
      </p>
      <p>
        <label for="position">
          <span>Position:</span>
          <input type="text" id="position" name="position"  required />
        </label>
      </p>
      <p>
        <label for="email">
          <span>Email:</span>
          <input type="email" id="email" name="email"  required />
        </label>
      </p>
      <p>
        <label for="phone">
          <span>Phone number:</span>
          <input type="text" id="phone" name="phone"  />
        </label>
      </p>
      <p>
        <label for="hire_date">
          <span>Hire Date:</span>
          <input type="date" id="hire_date" name="hire_date" required />
        </label>
      </p>
      <p>
        <label for="salary">
          <span>Salary (in $):</span>
          <input type="number" placeholder="1000.00" step="0.01" id="salary" name="salary" required />
        </label>
      </p>
      <div id="modalActions" style="display: flex;">
      </div>
    </form>
  </dialog>
</div>

<script>
  const DEPT_COLORS = {
    'Engineering': ['#e8f4fd', '#1565c0'],
    'Marketing':   ['#fce4ec', '#c2185b'],
    'HR':          ['#e8f5e9', '#2e7d32'],
    'Finance':     ['#fff8e1', '#f57f17'],
    'Design':      ['#f3e5f5', '#6a1b9a'],
  };

  const AVATAR_COLORS = ['#e63946','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#795548','#607d8b','#f06292','#26a69a'];

  let sortCol = 'id';
  let sortOrder = 'asc';
  let allEmployees = [];
  let currentPage = {};

  function avatarColor(name) {
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return AVATAR_COLORS[h % AVATAR_COLORS.length];
  }

  function initials(name) {
    return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
  }

  function deptBadge(dept) {
    const [bg, text] = DEPT_COLORS[dept] || ['#e0e0e0', '#555'];
    return `<span class="badge" style="background:${bg};color:${text}">${dept}</span>`;
  }

  function formatDate(d) {
    const [y, m, day] = d.split('-');
    return `${day}/${m}/${y}`;
  }

  function formatSalary(n) {
    return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
  }

  const tbody = document.getElementById('tableBody');

  function renderTable(employees) {
    document.getElementById('resultCount').textContent = `${employees.length} result${employees.length !== 1 ? 's' : ''}`;

    if (employees.length === 0) {
      tbody.innerHTML = `<tr><td colspan="6">
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <p>No employees match your search.</p>
        </div>
      </td></tr>`;
      return;
    }

    tbody.innerHTML = employees.map(emp => `
      <tr data-id="${emp.id}" class="employee-row">
        <td style="color:#aaa;font-size:0.82rem">#${emp.id}</td>
        <td>
          <div class="name-cell">
            <div class="avatar" style="background:${avatarColor(emp.name)}">${initials(emp.name)}</div>
            <div>
              <div class="name">${emp.name}</div>
              <div class="email">${emp.email}</div>
            </div>
          </div>
        </td>
        <td>${deptBadge(emp.department)}</td>
        <td>${emp.position}</td>
        <td>${formatDate(emp.hire_date)}</td>
        <td style="font-weight:600">${formatSalary(emp.salary)}</td>
      </tr>
    `).join('');
  }

  function updateSortHeaders() {
    document.querySelectorAll('thead th').forEach(th => {
      const col = th.dataset.col;
      th.classList.toggle('active', col === sortCol);
      const icon = th.querySelector('.sort-icon');
      if (col === sortCol) {
        icon.textContent = sortOrder === 'asc' ? '▲' : '▼';
      } else {
        icon.textContent = '▲';
      }
    });
  }

  async function loadDepartments() {
    const res = await fetch('/api/departments');
    const depts = await res.json();
    const sel = document.getElementById('deptFilter');
    depts.forEach(d => {
      const opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });
    document.getElementById('statDepts').textContent = depts.length;
  }

  function updatePage(){
    const search = document.getElementById('searchInput').value;
    const department = document.getElementById('deptFilter').value;
    renderTable(allEmployees);

    if (department === 'all' && !search) {
      document.getElementById('statTotal').textContent = allEmployees.length;
      const avg = allEmployees.reduce((s, e) => s + Number(e.salary), 0) / (allEmployees.length || 1);
      document.getElementById('statSalary').textContent = '$' + Math.round(avg / 1000) + 'k';
    }
  }

  async function loadEmployees() {
    const search = document.getElementById('searchInput').value;
    const department = document.getElementById('deptFilter').value;
    const params = new URLSearchParams({ search, department, sort: sortCol, order: sortOrder });
    const res = await fetch(`/api/employees?${params}`);
    const { data, meta } = await res.json();
    allEmployees = data;
    currentPage = meta;
    updatePage()
  }

  document.querySelectorAll('thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col;
        sortOrder = 'asc';
      }
      updateSortHeaders();
      loadEmployees();
    });
  });

  let debounceTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(loadEmployees, 250);
  });

  document.getElementById('deptFilter').addEventListener('change', loadEmployees);

  let selectedEmployee = undefined;

  const employeeFormModal = document.getElementById("employeeModal");
  const employeeForm = document.getElementById("employeeForm");
  const employeeOpenFormButton = document.getElementById("employeeOpenFormBtn");
  
  function openEmployeeForm(event, employee = undefined) {
    event.preventDefault();
    selectedEmployee = employee;
    
    const employeeFormHeader = document.getElementById("employeeFormHeader");
    const form = document.getElementById("employeeForm");
    const modalActions = document.getElementById("modalActions");

    // Reset the actions
    modalActions.innerHTML = "";

    if (selectedEmployee === undefined) {
      // Add employee
      employeeFormHeader.innerText = "Add Employee";
      form.reset();

      modalActions.appendChild(createButton("Submit", "submit"));
      modalActions.appendChild(createCancelButton());

    } else {
      // Update employee
      employeeFormHeader.innerText = "Update Employee";

      form.name.value = employee.name;
      form.department.value = employee.department;
      form.position.value = employee.position;
      form.email.value = employee.email;
      form.phone.value = employee.phone;
      form.hire_date.value = employee.hire_date;
      form.salary.value = employee.salary;

      modalActions.appendChild(createButton("Edit", "submit"));
      modalActions.appendChild(createDeleteButton(employee.id));
      modalActions.appendChild(createCancelButton());
    }

    employeeFormModal.showModal();
  }

  async function submitEmployeeForm(event) {
    event.preventDefault();

    const form = event.target;
    const formData = new FormData(form);
    const data = Object.fromEntries(formData.entries());

    if (selectedEmployee === undefined) {

      // Add employee
      const response = await fetch("/api/employees", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });
      
      const result = await response.json();

      if (!response.ok) {
        if (result.error?.includes("employees.email")) {
          alert("Email is already taken");
        } else {
          alert("Failed to create employee");
        }
        return;
      }

      await loadEmployees();
      employeeFormModal.close();
    } else {

      // Update employee
      const response = await fetch(`/api/employees/${selectedEmployee.id}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (!response.ok) {
        if (result.error?.includes("employees.email")) {
          alert("Email is already taken");
        } else {
          alert("Failed to update employee");
        }

        return;
      }
    }

    selectedEmployee = undefined;
    await loadEmployees();
    employeeFormModal.close();
  }

  async function deleteEmployee(event, id) {
    event.preventDefault();

    const confirmed = confirm("Are you sure you want to delete this employee?");
    if (!confirmed){
      return;
    }

    const response = await fetch(`/api/employees/${id}`, {
      method: "DELETE"
    });

    if (!response.ok) {
      alert("Failed to delete employee");
      employeeFormModal.close();
      return;
    }

    await loadEmployees();
    employeeFormModal.close();
  }

  function closeEmployeeForm(event) {
    event.preventDefault();
    selectedEmployee = undefined;
    employeeFormModal.close();
  }
  
  function openEmployeeFormById(event, id) {
    const employee = allEmployees.find(e => e.id === id);
    openEmployeeForm(event, employee);
  }

  employeeForm.addEventListener('submit', submitEmployeeForm)
  employeeOpenFormButton.addEventListener('click', openEmployeeForm);
  
  function createButton(text, type = "button") {
    const btn = document.createElement("button");
    btn.textContent = text;
    btn.type = type;
    return btn;
  }

  function createCancelButton() {
    const btn = createButton("Cancel");
    btn.addEventListener("click", closeEmployeeForm);
    btn.style.marginLeft = "auto";
    return btn;
  }

  function createDeleteButton(id) {
    const btn = createButton("Delete");
    btn.addEventListener("click", (event) => deleteEmployee(event, id));
    btn.style.marginLeft = ".5rem";
    btn.style.background = "#D32F2F";
    return btn;
  }

  tbody.addEventListener("click", (e) => {
    const row = e.target.closest("tr");
    if (!row) {
      return;
    }
    const id = Number(row.dataset.id);
    openEmployeeFormById(e, id);
  });

  updateSortHeaders();
  loadDepartments();
  loadEmployees();
</script>

</body>
</html>
